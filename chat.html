<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>الدعم والمحادثة — NovaShop</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#c8a96b">
<link rel="stylesheet" href="styles.css?v=3">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="db.js"></script>
<script src="api.js"></script>
<script src="notifications.js" defer></script>
<style>
/* ===== CHAT PAGE ===== */
.chat-page { display:flex; height:calc(100vh - 72px); margin-top:72px; overflow:hidden; box-sizing:border-box; }

/* Sidebar */
.chat-sidebar {
  width:320px; flex-shrink:0; border-left:1px solid var(--border);
  background:var(--card); display:flex; flex-direction:column;
  overflow:hidden;
}
.chat-sidebar-head {
  padding:20px 18px 14px; border-bottom:1px solid var(--border); flex-shrink:0;
}
.chat-sidebar-head h2 { font-size:1rem; font-weight:800; margin-bottom:12px; }
.chat-sidebar-list { overflow-y:auto; flex:1; }
.chat-sidebar-list::-webkit-scrollbar { width:4px; }
.chat-sidebar-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* Conversation item in sidebar */
.convo-item {
  padding:14px 16px; display:flex; align-items:center; gap:12px;
  cursor:pointer; border-bottom:1px solid rgba(200,169,107,0.06);
  transition:background 0.15s; position:relative;
}
.convo-item:hover, .convo-item.active { background:rgba(200,169,107,0.07); }
.convo-item.active { border-right:3px solid var(--accent); }
.convo-avatar {
  width:42px; height:42px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:1rem; color:white;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
}
.convo-info { flex:1; min-width:0; }
.convo-name { font-weight:700; font-size:0.88rem; margin-bottom:2px; }
.convo-last { color:var(--muted); font-size:0.77rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.convo-meta { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
.convo-time { color:var(--muted); font-size:0.7rem; }
.convo-unread {
  background:#ef4444; color:white; font-size:0.65rem; font-weight:800;
  min-width:18px; height:18px; border-radius:50px;
  display:flex; align-items:center; justify-content:center; padding:0 4px;
}

/* New chat button */
.new-chat-btn {
  margin:12px 16px; padding:11px; border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white; border:none; cursor:pointer; font-family:'Tajawal',sans-serif;
  font-weight:700; font-size:0.9rem; transition:opacity 0.2s; text-align:center;
}
.new-chat-btn:hover { opacity:0.85; }

/* Main chat area */
.chat-main {
  flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg);
}
.chat-header {
  padding:16px 20px; border-bottom:1px solid var(--border);
  background:var(--card); display:flex; align-items:center;
  gap:14px; flex-shrink:0;
}
.chat-header-avatar {
  width:40px; height:40px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex; align-items:center; justify-content:center;
  font-weight:800; color:white;
}
.chat-header-info { flex:1; }
.chat-header-name { font-weight:800; font-size:0.95rem; }
.chat-header-status { color:var(--muted); font-size:0.78rem; }
.chat-close-btn {
  padding:7px 14px; border-radius:8px; cursor:pointer;
  background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.25);
  color:#ef4444; font-family:'Tajawal',sans-serif; font-size:0.82rem; font-weight:700;
}

/* Messages */
.chat-messages {
  flex:1; overflow-y:auto; padding:20px 16px;
  display:flex; flex-direction:column; gap:10px;
  direction:ltr; /* rows laid out LTR, text inside bubbles is RTL */
}
.chat-messages::-webkit-scrollbar { width:4px; }
.chat-messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.msg-row {
  display:flex; align-items:flex-end; gap:8px;
  direction:ltr; /* fix: prevent double-reverse on RTL page */
}
.msg-row.mine { justify-content:flex-end; }
.msg-row.mine .msg-avatar { order:2; }
.msg-row.mine .msg-content { order:1; }
.msg-avatar {
  width:36px; height:36px; border-radius:50%; flex-shrink:0;
  background:rgba(200,169,107,0.15); display:flex; align-items:center;
  justify-content:center; font-size:0.9rem; font-weight:800; color:var(--accent);
  text-transform:uppercase; line-height:1;
}
.msg-row.mine .msg-avatar { background:rgba(34,197,94,0.12); color:#22c55e; }
.msg-content { display:flex; flex-direction:column; max-width:68%; min-width:0; }
.msg-row.mine .msg-content { align-items:flex-end; }
.msg-bubble {
  padding:10px 14px; border-radius:16px;
  background:var(--card); border:1px solid var(--border);
  font-size:0.9rem; line-height:1.6; word-break:break-word;
  direction:rtl; text-align:right; /* enforce Arabic text direction */
  white-space:pre-wrap;
}
.msg-row.mine .msg-bubble {
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white; border:none; border-radius:16px 4px 16px 16px;
}
.msg-row:not(.mine) .msg-bubble { border-radius:4px 16px 16px 16px; }
.msg-time { font-size:0.68rem; color:var(--muted); margin-top:4px; direction:ltr; text-align:left; }
.msg-del-btn {
  background:none; border:none; cursor:pointer; color:transparent;
  font-size:0.78rem; padding:2px 4px; border-radius:4px;
  transition:color 0.15s, background 0.15s; line-height:1; flex-shrink:0;
  align-self:flex-start; margin-top:4px;
}
.msg-row:hover .msg-del-btn { color:#ef4444; }
.msg-del-btn:hover { background:rgba(239,68,68,0.1) !important; }
.msg-row.mine .msg-del-btn { color:transparent; }
.msg-row.mine:hover .msg-del-btn { color:rgba(239,68,68,0.7); }
.msg-row.mine .msg-time { color:rgba(255,255,255,0.65); text-align:right; direction:ltr; }
.msg-date-divider {
  text-align:center; color:var(--muted); font-size:0.75rem;
  margin:8px 0; position:relative;
}
.msg-date-divider::before {
  content:""; position:absolute; top:50%; left:0; right:0;
  height:1px; background:var(--border);
}
.msg-date-divider span { background:var(--bg); padding:0 12px; position:relative; }

/* Input area */
.chat-input-wrap {
  padding:14px 16px; border-top:1px solid var(--border);
  background:var(--card); display:flex; gap:10px; align-items:flex-end; flex-shrink:0;
}
.chat-input {
  flex:1; background:var(--bg); border:1px solid var(--border);
  color:var(--text); padding:10px 14px; border-radius:12px;
  font-family:'Tajawal',sans-serif; font-size:1rem; resize:none;
  outline:none; max-height:120px; transition:border-color 0.2s; line-height:1.5;
  -webkit-appearance:none; /* remove iOS inner shadow */
}
.chat-input:focus { border-color:var(--accent); }
.chat-send-btn {
  width:44px; height:44px; border-radius:12px; border:none; cursor:pointer; flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white; font-size:1.1rem; display:flex; align-items:center; justify-content:center;
  transition:opacity 0.2s;
}
.chat-send-btn:hover { opacity:0.85; }
.chat-send-btn:disabled { opacity:0.4; cursor:not-allowed; }

/* Empty state */
.chat-empty {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; text-align:center; padding:40px; color:var(--muted);
}
.chat-empty-icon { font-size:4rem; margin-bottom:16px; }
.chat-empty h3 { font-size:1.2rem; color:var(--text); margin-bottom:8px; }

/* New chat modal */
.modal-overlay { display:none; position:fixed; inset:0; z-index:9000; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; }
.modal-overlay.show { display:flex; }
.modal-box { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:28px; width:100%; max-width:440px; }
.modal-box h3 { font-size:1.1rem; font-weight:800; margin-bottom:20px; }

.staff-card {
  display:flex; align-items:center; gap:14px; padding:14px 16px;
  border:1px solid var(--border); border-radius:12px; margin-bottom:10px;
  cursor:pointer; transition:all 0.2s;
}
.staff-card:hover { border-color:var(--accent); background:rgba(200,169,107,0.05); }
.staff-avatar {
  width:44px; height:44px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:1.1rem; color:white; flex-shrink:0;
}

/* ===== MOBILE RESPONSIVE ===== */

/* Tablet (768px) */
@media(max-width:768px) {

  /* Stack vertically */
  .chat-page {
    flex-direction:column;
    height:100dvh;          /* dvh = dynamic viewport — accounts for mobile browser chrome */
    margin-top:0;
    padding-top:64px;       /* height of navbar */
  }

  /* Sidebar: compact strip at top */
  .chat-sidebar {
    width:100%;
    height:auto;
    max-height:38vh;
    flex-shrink:0;
    border-left:none;
    border-bottom:1px solid var(--border);
  }

  /* Chat main: fill remaining height */
  .chat-main {
    flex:1;
    min-height:0;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  /* Messages area: must scroll, not overflow page */
  .chat-messages {
    flex:1;
    min-height:0;
    overflow-y:auto;
    padding:12px 10px;
    -webkit-overflow-scrolling:touch;
  }

  /* Input bar: stick to bottom, above keyboard */
  .chat-input-wrap {
    flex-shrink:0;
    padding:10px 12px;
    padding-bottom:env(safe-area-inset-bottom, 10px); /* iPhone safe area */
  }

  /* Bubbles: wider on mobile */
  .msg-content { max-width:80%; }
  .msg-bubble  { font-size:0.88rem; padding:9px 12px; }

  /* Header: smaller */
  .chat-header { padding:12px 14px; }

  /* New chat buttons: stack on small screens */
  .chat-sidebar-head { padding:14px 14px 10px; }
  .chat-sidebar-head div { flex-direction:row; gap:6px; }
  .new-chat-btn { font-size:0.82rem; padding:9px 8px; margin:0; }

  /* Convo list items: tighter */
  .convo-item { padding:10px 12px; gap:10px; }
  .convo-avatar { width:36px; height:36px; font-size:0.9rem; }

  /* Modal: full-width with margin */
  .modal-box {
    margin:16px;
    max-height:80vh;
    overflow-y:auto;
    padding:20px 16px;
  }
}

/* Small phones (480px) */
@media(max-width:480px) {

  .chat-page { padding-top:60px; }

  /* Sidebar even shorter to give more room to chat */
  .chat-sidebar { max-height:32vh; }

  /* Sidebar head: very compact */
  .chat-sidebar-head h2 { font-size:0.88rem; margin-bottom:8px; }
  .chat-sidebar-head { padding:10px 12px 8px; }

  /* Bubbles: near full width */
  .msg-content { max-width:86%; }
  .msg-bubble  { font-size:0.85rem; padding:8px 11px; }
  .msg-avatar  { width:30px; height:30px; font-size:0.78rem; }

  /* Input: bigger touch target */
  .chat-send-btn { width:42px; height:42px; }
  .chat-input    { font-size:1rem; padding:9px 12px; } /* 1rem prevents iOS zoom */

  /* Time: smaller */
  .msg-time { font-size:0.62rem; }

  /* Close button in header: icon only */
  .chat-close-btn { padding:7px 10px; font-size:0.78rem; }

  /* Modal full screen almost */
  .modal-box {
    margin:8px;
    border-radius:14px;
    max-height:88vh;
  }
}

/* Very small / landscape phones */
@media(max-width:380px) {
  .chat-sidebar { max-height:28vh; }
  .msg-content  { max-width:90%; }
}

/* Landscape phone: sidebar becomes very thin */
@media(max-height:500px) and (max-width:900px) {
  .chat-sidebar { max-height:28vh; }
  .chat-page { padding-top:56px; }
}
</style>
</head>
<body>
<div class="cursor-glow" id="cursorGlow"></div>

<header id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-icon">◈</span><span>Nova<strong>Shop</strong></span></a>
    <nav class="nav-links">
      <a href="index.html">الرئيسية</a>
      <a href="products.html">المنتجات</a>
      <a href="cart.html" class="cart-link">السلة<span class="cart-badge" id="cartCount">0</span></a>
      <span id="userNavItem"></span>
      <button class="notif-btn" onclick="NS_Notifications && NS_Notifications.togglePanel()" id="notifToggle" style="display:none">
        🔔<span class="notif-badge" style="display:none">0</span>
      </button>
      <span id="adminNavItem"></span>
    </nav>
    <button class="notif-btn notif-btn-mobile" onclick="NS_Notifications && NS_Notifications.togglePanel()" id="notifToggleMobile" style="display:none;position:relative;background:rgba(200,169,107,0.08);border:1px solid rgba(200,169,107,0.2);border-radius:10px;padding:7px 10px;cursor:pointer;align-items:center;gap:4px;color:#94a3b8;font-size:1rem;">🔔<span class="notif-badge" style="display:none">0</span></button>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">الرئيسية</a>
    <a href="products.html">المنتجات</a>
    <a href="cart.html">السلة</a>
    <a href="profile.html">حسابي</a>
    <button onclick="NS_Notifications && NS_Notifications.togglePanel()" id="notifMobileMenuBtn" style="display:none;background:none;border:none;color:var(--text);font-family:'Tajawal',sans-serif;font-size:1rem;padding:14px 28px;text-align:right;width:100%;cursor:pointer;border-bottom:1px solid var(--border);">🔔 الإشعارات</button>
    <span id="adminMobileItem"></span>
  </div>
</header>

<!-- Main Layout -->
<div class="chat-page">
  <!-- Sidebar: conversation list -->
  <div class="chat-sidebar">
    <div class="chat-sidebar-head">
      <h2>💬 محادثاتي</h2>
      <div style="display:flex;gap:8px">
        <button class="new-chat-btn" style="flex:1" onclick="openNewChatModal()">+ محادثة جديدة</button>
        <button class="new-chat-btn" style="flex:1;background:rgba(181,112,58,0.12);border:1px solid rgba(181,112,58,0.3);color:#b5703a" onclick="startRandomChat()">🎲 موظف عشوائي</button>
      </div>
    </div>
    <div class="chat-sidebar-list" id="convList">
      <div style="padding:40px;text-align:center;color:var(--muted)">
        <div style="font-size:2rem;margin-bottom:8px">💬</div>
        <div>جاري التحميل...</div>
      </div>
    </div>
  </div>

  <!-- Main area: messages -->
  <div class="chat-main" id="chatMain">
    <div class="chat-empty" id="chatEmpty">
      <div class="chat-empty-icon">💬</div>
      <h3>ابدأ محادثة مع فريق الدعم</h3>
      <p style="margin-bottom:24px;max-width:320px;line-height:1.7">
        تواصل مع أحد موظفينا أو اختر موظفاً عشوائياً للحصول على المساعدة الفورية
      </p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
        <button onclick="openNewChatModal()"
          style="padding:11px 24px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));
                 color:white;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;font-weight:700">
          اختر موظفاً
        </button>
        <button onclick="startRandomChat()"
          style="padding:11px 24px;border-radius:10px;background:rgba(181,112,58,0.1);
                 border:1px solid rgba(181,112,58,0.3);color:#b5703a;cursor:pointer;
                 font-family:'Tajawal',sans-serif;font-weight:700">
          🎲 موظف عشوائي
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: اختيار موظف -->
<div class="modal-overlay" id="staffModal">
  <div class="modal-box">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <h3 style="margin:0">🎧 اختر موظفاً</h3>
      <button onclick="closeModal('staffModal')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem">✕</button>
    </div>
    <div id="staffList">
      <div style="text-align:center;padding:30px;color:var(--muted)">⏳ جاري التحميل...</div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
document.addEventListener("mousemove", e => {
  const g = document.getElementById("cursorGlow");
  if (g) { g.style.left = e.clientX + "px"; g.style.top = e.clientY + "px"; }
});
window.addEventListener("scroll", () => document.getElementById("navbar").classList.toggle("scrolled", window.scrollY > 50));
function toggleMenu() { document.getElementById("mobileMenu").classList.toggle("open"); }

function showToast(msg) {
  const t = document.getElementById("toast");
  if (!t) return;
  t.textContent = msg; t.className = "toast show";
  setTimeout(() => t.classList.remove("show"), 3000);
}
function openModal(id)  { document.getElementById(id).classList.add("show"); }
function closeModal(id) { document.getElementById(id).classList.remove("show"); }

// ── Auth ──────────────────────────────────────────────────────────────
let currentSession = null;
let activeChatId   = null;
let pollInterval   = null;

document.addEventListener("DOMContentLoaded", () => {
  const cart = document.getElementById("cartCount");
  if (cart) cart.textContent = (JSON.parse(localStorage.getItem("cart")) || []).length;

  currentSession = JSON.parse(localStorage.getItem("ns_session") || "null");
  if (!currentSession) {
    window.location.href = "login.html?redirect=chat.html";
    return;
  }

  const userNav   = document.getElementById("userNavItem");
  const notifBtn  = document.getElementById("notifToggle");
  const adminNav  = document.getElementById("adminNavItem");
  const mobileNotif = document.getElementById("notifToggleMobile");
  const mobileMenuNotif = document.getElementById("notifMobileMenuBtn");

  if (userNav) userNav.innerHTML = `<a href="profile.html" style="color:var(--accent);font-weight:700;padding:8px 16px;border-radius:8px;text-decoration:none">👤 ${currentSession.name}</a>`;
  if (notifBtn) notifBtn.style.display = "flex";
  if (mobileNotif) mobileNotif.style.display = "flex";
  if (mobileMenuNotif) mobileMenuNotif.style.display = "block";
  if (currentSession.role === "admin") {
    if (adminNav) adminNav.innerHTML = `<a href="admin.html" class="nav-admin">⚙ الإدارة</a>`;
    document.getElementById("adminMobileItem").innerHTML = `<a href="admin.html">الإدارة</a>`;
  }
  if (notifBtn) setTimeout(() => NS_Notifications?.init?.(), 500);

  loadMyChats();

  // Open chat from URL param
  const chatId = new URLSearchParams(location.search).get("id");
  if (chatId) openChat(chatId);
});

// ── Load conversations sidebar ─────────────────────────────────────
async function loadMyChats() {
  const token = localStorage.getItem("ns_token");
  const cont  = document.getElementById("convList");
  try {
    if (token) {
      const res = await fetch("/api/chat/my", {
        headers: { "Authorization": "Bearer " + token },
        signal: AbortSignal.timeout(5000)
      }).then(r => r.json());
      if (res.ok) { renderConvList(res.chats); return; }
    }
  } catch {}
  // Offline state
  cont.innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted)">
    <div style="font-size:2rem;margin-bottom:8px">📡</div>
    <div style="font-size:0.85rem">السيرفر غير متاح<br>الدردشة تتطلب اتصالاً</div>
  </div>`;
}

function renderConvList(chats) {
  const cont = document.getElementById("convList");
  if (!chats || chats.length === 0) {
    cont.innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted)">
      <div style="font-size:2rem;margin-bottom:8px">💭</div>
      <div style="font-size:0.85rem">لا توجد محادثات بعد<br>ابدأ محادثة جديدة</div>
    </div>`;
    return;
  }
  cont.innerHTML = "";
  chats.forEach(ch => {
    const div = document.createElement("div");
    div.className = "convo-item" + (ch.chatId === activeChatId ? " active" : "");
    div.onclick = () => openChat(ch.chatId);
    const roleEmoji = ch.otherRole === "admin" ? "👑" : ch.otherRole === "staff" ? "🎧" : "👤";
    const ago = timeAgo(ch.lastTime);
    div.innerHTML = `
      <div class="convo-avatar">${(ch.otherName || "?")[0].toUpperCase()}</div>
      <div class="convo-info">
        <div class="convo-name">${roleEmoji} ${ch.otherName}</div>
        <div class="convo-last">${ch.lastMsg || "لا توجد رسائل"}</div>
      </div>
      <div class="convo-meta">
        <span class="convo-time">${ago}</span>
        ${ch.unread > 0 ? `<span class="convo-unread">${ch.unread}</span>` : ""}
        ${ch.status === "closed" ? `<span style="color:#ef4444;font-size:0.68rem">مغلقة</span>` : ""}
      </div>`;
    cont.appendChild(div);
  });
}

// ── Open a chat ────────────────────────────────────────────────────
async function openChat(chatId) {
  activeChatId = chatId;
  clearInterval(pollInterval);

  const token = localStorage.getItem("ns_token");
  const main  = document.getElementById("chatMain");

  // Show loading
  main.innerHTML = `<div class="chat-empty"><div class="chat-empty-icon">⏳</div><p>جاري تحميل المحادثة...</p></div>`;

  try {
    const res = await fetch("/api/chat/" + chatId, {
      headers: { "Authorization": "Bearer " + token },
      signal: AbortSignal.timeout(5000)
    }).then(r => r.json());

    if (!res.ok) {
      main.innerHTML = `<div class="chat-empty"><div class="chat-empty-icon">❌</div><p>${res.msg}</p></div>`;
      return;
    }

    renderChatArea(res.chat, res.otherName, res.otherRole);
    loadMyChats(); // refresh sidebar unread counts

    // Poll for new messages every 3s
    pollInterval = setInterval(() => refreshMessages(chatId), 3000);

  } catch {
    main.innerHTML = `<div class="chat-empty"><div class="chat-empty-icon">📡</div><p>تعذّر تحميل المحادثة</p></div>`;
  }
}

function renderChatArea(chat, otherName, otherRole) {
  const main = document.getElementById("chatMain");
  const roleEmoji = otherRole === "admin" ? "👑" : "🎧";
  const isClosed  = chat.status === "closed";
  const isStaff   = currentSession.role === "admin" || currentSession.role === "staff";

  main.innerHTML = `
    <div class="chat-header">
      <div class="chat-header-avatar">${(otherName || "?")[0].toUpperCase()}</div>
      <div class="chat-header-info">
        <div class="chat-header-name">${roleEmoji} ${otherName}</div>
        <div class="chat-header-status">${isClosed ? "🔴 محادثة مغلقة" : "🟢 نشط"}</div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0">
        ${isStaff && !isClosed ? `<button class="chat-close-btn" onclick="closeThisChat('${chat.chatId}')">إغلاق</button>` : ""}
        <button onclick="deleteChat('${chat.chatId}')"
          style="padding:7px 12px;border-radius:8px;cursor:pointer;
                 background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);
                 color:#ef4444;font-family:'Tajawal',sans-serif;font-size:0.82rem;font-weight:700"
          title="حذف المحادثة">🗑 حذف</button>
      </div>
    </div>
    <div class="chat-messages" id="msgArea"></div>
    ${isClosed ? `
      <div style="padding:14px;text-align:center;color:var(--muted);font-size:0.85rem;border-top:1px solid var(--border);background:var(--card)">
        🔴 هذه المحادثة مغلقة — <button onclick="startRandomChat()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:0.85rem;text-decoration:underline">ابدأ محادثة جديدة</button>
      </div>` : `
    <div class="chat-input-wrap">
      <textarea class="chat-input" id="msgInput" placeholder="اكتب رسالتك..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
      <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()" title="إرسال">➤</button>
    </div>`}
  `;

  renderMessages(chat.messages, chat, otherName);
}

function renderMessages(messages, chat, otherName) {
  const area = document.getElementById("msgArea");
  if (!area) return;
  area.innerHTML = "";

  if (messages.length === 0) {
    area.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">
      <div style="font-size:2.5rem;margin-bottom:8px">👋</div>
      <div>لا توجد رسائل بعد — ابدأ المحادثة!</div>
    </div>`;
    return;
  }

  let lastDate = "";
  messages.forEach(m => {
    const msgDate = new Date(m.createdAt).toLocaleDateString("ar-JO", {weekday:"short",day:"numeric",month:"short"});
    if (msgDate !== lastDate) {
      const div = document.createElement("div");
      div.className = "msg-date-divider";
      div.innerHTML = `<span>${msgDate}</span>`;
      area.appendChild(div);
      lastDate = msgDate;
    }

    const isMine = m.senderId == currentSession.id;
    const row = document.createElement("div");
    row.className = "msg-row" + (isMine ? " mine" : "");
    row.dataset.msgId = m.id;
    const time = new Date(m.createdAt).toLocaleTimeString("ar-JO", {hour:"2-digit",minute:"2-digit"});
    const initials = isMine ? currentSession.name[0].toUpperCase() : "?";
    const senderInitial = isMine
      ? (currentSession.name || "?")[0].toUpperCase()
      : (otherName || "?")[0].toUpperCase();

    row.innerHTML = `
      <div class="msg-avatar">${senderInitial}</div>
      <div class="msg-content">
        <div class="msg-bubble">${escapeHtml(m.text)}</div>
        <div class="msg-time">${time}${isMine ? (m.read ? " ✓✓" : " ✓") : ""}</div>
      </div>
      <button class="msg-del-btn" onclick="deleteMessage('${activeChatId}','${m.id}',this)"
        title="حذف الرسالة">🗑</button>`;
    area.appendChild(row);
  });

  area.scrollTop = area.scrollHeight;
}

async function refreshMessages(chatId) {
  const token = localStorage.getItem("ns_token");
  try {
    const res = await fetch("/api/chat/" + chatId, {
      headers: { "Authorization": "Bearer " + token },
      signal: AbortSignal.timeout(3000)
    }).then(r => r.json());
    if (!res.ok) return;

    // Only re-render if message count changed
    const area = document.getElementById("msgArea");
    if (!area) return;
    const currentCount = area.querySelectorAll(".msg-row").length;
    if (res.chat.messages.length !== currentCount) {
      // Get otherName from header if available
      const headerName = document.querySelector('.chat-header-name')?.textContent?.replace(/[👑🎧]/g,'').trim() || "موظف";
      renderMessages(res.chat.messages, res.chat, headerName);
      loadMyChats();
    }
  } catch {}
}

// ── Send message ───────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById("msgInput");
  const btn   = document.getElementById("sendBtn");
  if (!input || !activeChatId) return;
  const text = input.value.trim();
  if (!text) return;

  btn.disabled = true;
  const token = localStorage.getItem("ns_token");
  input.value = "";
  input.style.height = "auto";

  try {
    const res = await fetch("/api/chat/" + activeChatId + "/send", {
      method: "POST",
      headers: { "Content-Type":"application/json", "Authorization":"Bearer " + token },
      body: JSON.stringify({ text }),
      signal: AbortSignal.timeout(5000)
    }).then(r => r.json());

    btn.disabled = false;
    if (res.ok) {
      openChat(activeChatId); // refresh
    } else {
      showToast("❌ " + res.msg);
      input.value = text;
    }
  } catch {
    btn.disabled = false;
    showToast("⚠️ تعذّر الإرسال");
    input.value = text;
  }
}

// ── Close chat ─────────────────────────────────────────────────────
// ── حذف رسالة واحدة ────────────────────────────────────────────
async function deleteMessage(chatId, msgId, btn) {
  const token = localStorage.getItem("ns_token");
  // تأثير بصري فوري
  const row = btn.closest(".msg-row");
  if (row) row.style.opacity = "0.4";

  try {
    const res = await fetch(`/api/chat/${chatId}/message/${msgId}`, {
      method: "DELETE",
      headers: { "Authorization": "Bearer " + token },
      signal: AbortSignal.timeout(5000)
    }).then(r => r.json());

    if (res.ok) {
      // احذف الـ row من الـ DOM مباشرة بدون reload
      if (row) {
        row.style.animation = "fadeOut 0.25s ease forwards";
        setTimeout(() => row.remove(), 250);
      }
    } else {
      if (row) row.style.opacity = "1";
      showToast("❌ " + (res.msg || "تعذّر الحذف"));
    }
  } catch {
    if (row) row.style.opacity = "1";
    showToast("⚠️ تعذّر الاتصال");
  }
}

// ── حذف دردشة كاملة ─────────────────────────────────────────────
async function deleteChat(chatId) {
  if (!confirm("هل تريد حذف هذه المحادثة نهائياً؟ لا يمكن التراجع.")) return;
  const token = localStorage.getItem("ns_token");
  try {
    const res = await fetch("/api/chat/" + chatId, {
      method: "DELETE",
      headers: { "Authorization": "Bearer " + token },
      signal: AbortSignal.timeout(5000)
    }).then(r => r.json());

    if (res.ok) {
      showToast("✅ تم حذف المحادثة");
      activeChatId = null;
      clearInterval(pollInterval);
      // أعد تحميل القائمة وأظهر الشاشة الفارغة
      loadMyChats();
      document.getElementById("chatMain").innerHTML = `
        <div class="chat-empty">
          <div class="chat-empty-icon">💬</div>
          <h3>ابدأ محادثة جديدة</h3>
          <p style="margin-bottom:24px">تم حذف المحادثة بنجاح</p>
          <button onclick="openNewChatModal()"
            style="padding:11px 24px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));
                   color:white;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;font-weight:700">
            اختر موظفاً
          </button>
        </div>`;
    } else {
      showToast("❌ " + (res.msg || "تعذّر الحذف"));
    }
  } catch {
    showToast("⚠️ تعذّر الاتصال");
  }
}

async function closeThisChat(chatId) {
  if (!confirm("هل تريد إغلاق هذه المحادثة؟")) return;
  const token = localStorage.getItem("ns_token");
  try {
    const res = await fetch("/api/chat/" + chatId + "/close", {
      method: "PUT", headers: { "Authorization": "Bearer " + token },
      signal: AbortSignal.timeout(5000)
    }).then(r => r.json());
    if (res.ok) { showToast("✅ تم إغلاق المحادثة"); openChat(chatId); loadMyChats(); }
  } catch { showToast("⚠️ تعذّرت العملية"); }
}

// ── New chat modal ─────────────────────────────────────────────────
async function openNewChatModal() {
  openModal("staffModal");
  const token = localStorage.getItem("ns_token");
  const cont  = document.getElementById("staffList");
  cont.innerHTML = `<div style="text-align:center;padding:20px;color:var(--muted)">⏳</div>`;

  try {
    const res = await fetch("/api/chat/staff", {
      headers: { "Authorization": "Bearer " + token },
      signal: AbortSignal.timeout(5000)
    }).then(r => r.json());

    if (res.ok && res.staff.length > 0) {
      cont.innerHTML = "";
      res.staff.forEach(s => {
        const roleLabel  = s.role === "admin" ? "👑 مدير" : "🎧 موظف دعم";
        const roleColors = s.role === "admin"
          ? "background:linear-gradient(135deg,#f59e0b,#d97706)"
          : "background:linear-gradient(135deg,#b5703a,#9a7640)";
        const card = document.createElement("div");
        card.className = "staff-card";
        card.onclick = () => { closeModal("staffModal"); startChatWith(s.id); };
        card.innerHTML = `
          <div class="staff-avatar" style="${roleColors}">${s.avatar}</div>
          <div style="flex:1">
            <div style="font-weight:700;font-size:0.92rem">${s.name}</div>
            <div style="color:var(--muted);font-size:0.8rem">${roleLabel}</div>
          </div>
          <div style="color:#22c55e;font-size:0.8rem;font-weight:700">🟢 متاح</div>`;
        cont.appendChild(card);
      });
    } else {
      cont.innerHTML = `<div style="text-align:center;padding:30px;color:var(--muted)">
        <div style="font-size:2.5rem;margin-bottom:8px">😴</div>
        <div>لا يوجد موظفون متاحون حالياً</div>
        <button onclick="closeModal('staffModal');startRandomChat()" 
          style="margin-top:14px;padding:9px 20px;border-radius:9px;background:rgba(200,169,107,0.1);
                 border:1px solid var(--accent);color:var(--accent);cursor:pointer;
                 font-family:'Tajawal',sans-serif;font-size:0.88rem">
          🎲 اختر عشوائياً
        </button>
      </div>`;
    }
  } catch {
    cont.innerHTML = `<div style="text-align:center;padding:30px;color:var(--muted)">⚠️ تعذّر التحميل</div>`;
  }
}

async function startChatWith(staffId) {
  const token = localStorage.getItem("ns_token");
  try {
    const res = await fetch("/api/chat/start", {
      method: "POST",
      headers: { "Content-Type":"application/json", "Authorization":"Bearer " + token },
      body: JSON.stringify({ staffId }),
      signal: AbortSignal.timeout(5000)
    }).then(r => r.json());
    if (res.ok) {
      showToast(res.existing ? "✅ محادثة موجودة بالفعل" : "✅ تم بدء المحادثة");
      openChat(res.chatId);
      loadMyChats();
    } else {
      showToast("❌ " + res.msg);
    }
  } catch { showToast("⚠️ تعذّر بدء المحادثة"); }
}

async function startRandomChat() {
  const token = localStorage.getItem("ns_token");
  showToast("🔍 جاري البحث عن موظف...");
  try {
    const res = await fetch("/api/chat/random", {
      method: "POST",
      headers: { "Authorization":"Bearer " + token },
      signal: AbortSignal.timeout(5000)
    }).then(r => r.json());
    if (res.ok) {
      showToast(res.existing
        ? "✅ لديك محادثة مفتوحة بالفعل"
        : `✅ تم ربطك بـ ${res.staffName}`);
      openChat(res.chatId);
      loadMyChats();
    } else {
      showToast("❌ " + res.msg);
    }
  } catch { showToast("⚠️ تعذّر الاتصال"); }
}

// ── Utilities ──────────────────────────────────────────────────────
function escapeHtml(str) {
  return String(str ?? "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;")
    .replace(/\n/g,"<br>");
}

function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff < 60)     return "الآن";
  if (diff < 3600)   return `${Math.floor(diff/60)}د`;
  if (diff < 86400)  return `${Math.floor(diff/3600)}س`;
  return new Date(dateStr).toLocaleDateString("ar-JO",{day:"numeric",month:"short"});
}

// Close modal on backdrop click
document.querySelectorAll(".modal-overlay").forEach(m =>
  m.addEventListener("click", e => { if (e.target === m) m.classList.remove("show"); })
);

// Cleanup poll on page leave
window.addEventListener("beforeunload", () => clearInterval(pollInterval));
</script>
