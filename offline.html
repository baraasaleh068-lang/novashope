<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaShop — غير متصل</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:#080b14; color:#f1f5f9;
    font-family:'Tajawal',system-ui,sans-serif; text-align:center; padding:24px;
  }
  .card {
    background:#111827; border:1px solid rgba(99,102,241,0.2);
    border-radius:24px; padding:48px 40px; max-width:420px; width:100%;
    box-shadow:0 30px 80px rgba(0,0,0,0.5);
  }
  .icon { font-size:5rem; margin-bottom:20px; animation:float 3s ease-in-out infinite; }
  h1 { font-size:1.6rem; font-weight:900; margin-bottom:10px; }
  p  { color:#94a3b8; line-height:1.7; margin-bottom:28px; }
  .btn {
    display:inline-flex; align-items:center; gap:8px;
    padding:13px 28px; border-radius:12px; border:none; cursor:pointer;
    background:linear-gradient(135deg,#6366f1,#8b5cf6);
    color:white; font-size:1rem; font-weight:700; text-decoration:none;
    font-family:'Tajawal',sans-serif; transition:opacity 0.2s;
  }
  .btn:hover { opacity:0.85; }
  .status {
    margin-top:20px; font-size:0.82rem; color:#475569;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .dot {
    width:8px; height:8px; border-radius:50%;
    background:#ef4444; animation:pulse 1.5s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>لا يوجد اتصال بالإنترنت</h1>
  <p>يبدو أنك غير متصل حالياً. تحقق من اتصالك بالإنترنت وحاول مجدداً.</p>
  <a href="/" class="btn" onclick="window.location.reload(); return false;">
    🔄 إعادة المحاولة
  </a>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">غير متصل</span>
  </div>
</div>
<script>
function checkOnline() {
  const dot  = document.getElementById("statusDot");
  const text = document.getElementById("statusText");
  if (navigator.onLine) {
    dot.style.background  = "#22c55e";
    text.textContent      = "عاد الاتصال! إعادة التوجيه...";
    setTimeout(() => window.location.href = "/", 1200);
  }
}
window.addEventListener("online",  checkOnline);
setInterval(checkOnline, 3000);
</script>
</body>
</html>
